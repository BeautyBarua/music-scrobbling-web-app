<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Listening Stats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <header class="header">
        <h1 class="title">Listener Stats</h1>
        <a class="btn" href="./add.html">Add listener</a>


        <label for="albumFilter">Filter by album:</label>
        <select id="albumFilter" aria-label="Filter listeners by album">
            <option value="all">All albums</option>
        </select>

        <label for="sortOrder">Sort:</label>
        <select id="sortOrder" aria-label="Sort listeners">
            <option value="name" selected>Name (A–Z)</option>
            <option value="scrobbles">Total scrobbles (high → low)</option>
        </select>
    </header>


    <div id="error" class="error" hidden></div>


    <main id="stats" class="grid" aria-live="polite"></main>


    <script type="module" src="./scripts/stats.js"></script>
</body>

</html>

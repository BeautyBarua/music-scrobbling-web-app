<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <h1 class="title">Music Library</h1>

    <label for="yearFilter">Filter by year:</label>
    <select id="yearFilter" aria-label="Filter albums by year"></select>

    <label for="genreFilter">Genre:</label>
    <select id="genreFilter" aria-label="Filter albums by genre"></select>

    <span id="status" role="status" aria-live="polite"></span>
  </header>

  <div id="error" class="error" hidden></div>
  <main id="library" class="grid" aria-live="polite"></main>
 
  <script type="module" src="./scripts/library.js"></script>
</body>
</html>
